<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg)" rx="10"/>

  <!-- Voter -->
  <rect x="20" y="50" width="160" height="120" rx="8" fill="#4a90d9" stroke="#2c5f9e" stroke-width="2"/>
  <text x="100" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Voter (Browser)</text>
  <text x="100" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="11">WASM Encryption</text>
  <text x="100" y="125" text-anchor="middle" fill="white" font-family="Arial" font-size="11">c_i = Enc(v_i)</text>
  <text x="100" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="11">aux_i = pkA^{sk_i}</text>

  <!-- Portal -->
  <rect x="220" y="50" width="160" height="120" rx="8" fill="#7b68ee" stroke="#4a3f8e" stroke-width="2"/>
  <text x="300" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Portal (nginx)</text>
  <text x="300" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="11">React + Tailwind</text>
  <text x="300" y="125" text-anchor="middle" fill="white" font-family="Arial" font-size="11">RBAC / JWT Auth</text>
  <text x="300" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Admin Panel</text>

  <!-- Backend -->
  <rect x="420" y="50" width="160" height="120" rx="8" fill="#50c878" stroke="#2e7e4a" stroke-width="2"/>
  <text x="500" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Backend (Node.js)</text>
  <text x="500" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Express API</text>
  <text x="500" y="125" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Prisma ORM</text>
  <text x="500" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Aggregation Service</text>

  <!-- PostgreSQL -->
  <rect x="620" y="50" width="120" height="120" rx="8" fill="#336791" stroke="#1a3d5c" stroke-width="2"/>
  <text x="680" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">PostgreSQL</text>
  <text x="680" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="11">voter_data</text>
  <text x="680" y="125" text-anchor="middle" fill="white" font-family="Arial" font-size="11">system_params</text>
  <text x="680" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="11">aggregated_results</text>

  <!-- Solana -->
  <rect x="780" y="50" width="100" height="120" rx="8" fill="#9945FF" stroke="#5c2a99" stroke-width="2"/>
  <text x="830" y="80" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Solana</text>
  <text x="830" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Anchor</text>
  <text x="830" y="125" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Test Validator</text>
  <text x="830" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="11">On-chain</text>

  <!-- Aggregator Native -->
  <rect x="420" y="220" width="160" height="80" rx="8" fill="#ff8c00" stroke="#b56a00" stroke-width="2"/>
  <text x="500" y="250" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">libtommath (C)</text>
  <text x="500" y="270" text-anchor="middle" fill="white" font-family="Arial" font-size="11">mp_invmod, mp_exptmod</text>
  <text x="500" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="11">25-bit vote packing</text>

  <!-- Docker -->
  <rect x="10" y="200" width="880" height="280" rx="8" fill="none" stroke="#0db7ed" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="20" y="220" fill="#0db7ed" font-family="Arial" font-size="12" font-weight="bold">Docker Compose (narad-network)</text>

  <!-- Arrows -->
  <line x1="180" y1="110" x2="220" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="110" x2="420" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="110" x2="620" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="110" x2="780" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="170" x2="500" y2="220" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Flow labels -->
  <text x="200" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">ci, aux_i</text>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">REST API</text>
  <text x="600" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">SQL</text>
  <text x="760" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">RPC</text>
</svg>
