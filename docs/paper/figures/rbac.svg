<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350">
  <rect width="700" height="350" fill="#fafafa" rx="10"/>
  <text x="350" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Role-Based Access Control (RBAC)</text>
  <rect x="50" y="50" width="280" height="130" rx="8" fill="#e91e63" stroke="#8a0e3a" stroke-width="2"/>
  <text x="190" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Admin Role</text>
  <text x="70" y="100" fill="white" font-family="Arial" font-size="11">- Create elections</text>
  <text x="70" y="118" fill="white" font-family="Arial" font-size="11">- Add/remove candidates</text>
  <text x="70" y="136" fill="white" font-family="Arial" font-size="11">- Add voters</text>
  <text x="70" y="154" fill="white" font-family="Arial" font-size="11">- Change election stage</text>
  <text x="70" y="172" fill="white" font-family="Arial" font-size="11">- Aggregate and view results</text>
  <rect x="370" y="50" width="280" height="130" rx="8" fill="#4a90d9" stroke="#2c5f9e" stroke-width="2"/>
  <text x="510" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Voter Role</text>
  <text x="390" y="100" fill="white" font-family="Arial" font-size="11">- View dashboard</text>
  <text x="390" y="118" fill="white" font-family="Arial" font-size="11">- Cast encrypted vote</text>
  <text x="390" y="136" fill="white" font-family="Arial" font-size="11">X No admin access (403)</text>
  <text x="390" y="154" fill="white" font-family="Arial" font-size="11">X Cannot create elections</text>
  <text x="390" y="172" fill="white" font-family="Arial" font-size="11">X Cannot view wallet info</text>
  <rect x="150" y="210" width="400" height="80" rx="8" fill="#50c878" stroke="#2e7d32" stroke-width="2"/>
  <text x="350" y="235" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">JWT Token (HS256)</text>
  <text x="350" y="255" text-anchor="middle" fill="white" font-family="Arial" font-size="11">{ email, voterId, electionId, role }</text>
  <text x="350" y="275" text-anchor="middle" fill="white" font-family="Arial" font-size="10">adminMiddleware returns 403 if role != admin</text>
  <line x1="190" y1="180" x2="250" y2="210" stroke="#333" stroke-width="2"/>
  <line x1="510" y1="180" x2="450" y2="210" stroke="#333" stroke-width="2"/>
</svg>
