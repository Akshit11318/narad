<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#fafafa" rx="10"/>
  <text x="400" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">25-bit Vote Packing (10 candidates, reverse order)</text>
  <rect x="20" y="50" width="70" height="40" fill="#ffc107" rx="3"/>
  <text x="55" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Cand 1</text>
  <text x="55" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">bits 225-249</text>
  <text x="55" y="120" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">v*2^225</text>
  <rect x="96" y="50" width="70" height="40" fill="#8bc34a" rx="3"/>
  <text x="131" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Cand 2</text>
  <text x="131" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">bits 200-224</text>
  <text x="131" y="120" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">v*2^200</text>
  <rect x="172" y="50" width="70" height="40" fill="#ff5722" rx="3"/>
  <text x="207" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Cand 3</text>
  <text x="207" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">bits 175-199</text>
  <text x="207" y="120" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">v*2^175</text>
  <rect x="248" y="50" width="70" height="40" fill="#7b68ee" rx="3"/>
  <text x="283" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Cand 4</text>
  <text x="283" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">bits 150-174</text>
  <text x="283" y="120" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">v*2^150</text>
  <rect x="324" y="50" width="70" height="40" fill="#00bcd4" rx="3"/>
  <text x="359" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Cand 5</text>
  <text x="359" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">bits 125-149</text>
  <text x="359" y="120" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">v*2^125</text>
  <rect x="400" y="50" width="70" height="40" fill="#e91e63" rx="3"/>
  <text x="435" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Cand 6</text>
  <text x="435" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">bits 100-124</text>
  <text x="435" y="120" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">v*2^100</text>
  <rect x="476" y="50" width="70" height="40" fill="#9945ff" rx="3"/>
  <text x="511" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Cand 7</text>
  <text x="511" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">bits 75-99</text>
  <text x="511" y="120" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">v*2^75</text>
  <rect x="552" y="50" width="70" height="40" fill="#ff8c00" rx="3"/>
  <text x="587" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Cand 8</text>
  <text x="587" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">bits 50-74</text>
  <text x="587" y="120" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">v*2^50</text>
  <rect x="628" y="50" width="70" height="40" fill="#50c878" rx="3"/>
  <text x="663" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Cand 9</text>
  <text x="663" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">bits 25-49</text>
  <text x="663" y="120" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">v*2^25</text>
  <rect x="704" y="50" width="70" height="40" fill="#4a90d9" rx="3"/>
  <text x="739" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Cand 10</text>
  <text x="739" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">bits 0-24</text>
  <text x="739" y="120" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">v*2^0</text>
  <rect x="20" y="150" width="770" height="40" rx="5" fill="#333"/>
  <text x="400" y="175" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">m = v1*2^225 + v2*2^200 + ... + v10*2^0</text>
  <text x="400" y="215" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Total: 10 x 25 = 250 bits &lt; N (255 bits)</text>
</svg>
