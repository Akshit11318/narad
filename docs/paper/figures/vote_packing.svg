<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180" font-family="serif">
  <rect width="800" height="180" fill="white"/>
  <text x="400" y="20" text-anchor="middle" font-size="12" font-weight="bold">25-bit Vote Packing: k=10 candidates, N=255 bits</text>

  <!-- Slots - B/W with hatching -->
  <defs>
    <pattern id="hatch1" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="0" y2="4" stroke="black" stroke-width="0.5"/>
    </pattern>
    <pattern id="hatch2" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="4" stroke="black" stroke-width="0.5"/>
    </pattern>
    <pattern id="hatch3" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="black" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- 10 slots, 25 bits each -->
  <rect x="20" y="35" width="70" height="35" fill="url(#hatch1)" stroke="black"/>
  <text x="55" y="55" text-anchor="middle" font-size="9">Cand 1</text>
  <text x="55" y="67" text-anchor="middle" font-size="8">bits 225-249</text>

  <rect x="95" y="35" width="70" height="35" fill="url(#hatch2)" stroke="black"/>
  <text x="130" y="55" text-anchor="middle" font-size="9">Cand 2</text>
  <text x="130" y="67" text-anchor="middle" font-size="8">bits 200-224</text>

  <rect x="170" y="35" width="70" height="35" fill="url(#hatch3)" stroke="black"/>
  <text x="205" y="55" text-anchor="middle" font-size="9">Cand 3</text>
  <text x="205" y="67" text-anchor="middle" font-size="8">bits 175-199</text>

  <rect x="245" y="35" width="70" height="35" fill="url(#hatch1)" stroke="black"/>
  <text x="280" y="55" text-anchor="middle" font-size="9">Cand 4</text>
  <text x="280" y="67" text-anchor="middle" font-size="8">bits 150-174</text>

  <rect x="320" y="35" width="70" height="35" fill="url(#hatch2)" stroke="black"/>
  <text x="355" y="55" text-anchor="middle" font-size="9">Cand 5</text>
  <text x="355" y="67" text-anchor="middle" font-size="8">bits 125-149</text>

  <rect x="395" y="35" width="70" height="35" fill="url(#hatch3)" stroke="black"/>
  <text x="430" y="55" text-anchor="middle" font-size="9">Cand 6</text>
  <text x="430" y="67" text-anchor="middle" font-size="8">bits 100-124</text>

  <rect x="470" y="35" width="70" height="35" fill="url(#hatch1)" stroke="black"/>
  <text x="505" y="55" text-anchor="middle" font-size="9">Cand 7</text>
  <text x="505" y="67" text-anchor="middle" font-size="8">bits 75-99</text>

  <rect x="545" y="35" width="70" height="35" fill="url(#hatch2)" stroke="black"/>
  <text x="580" y="55" text-anchor="middle" font-size="9">Cand 8</text>
  <text x="580" y="67" text-anchor="middle" font-size="8">bits 50-74</text>

  <rect x="620" y="35" width="70" height="35" fill="url(#hatch3)" stroke="black"/>
  <text x="655" y="55" text-anchor="middle" font-size="9">Cand 9</text>
  <text x="655" y="67" text-anchor="middle" font-size="8">bits 25-49</text>

  <rect x="695" y="35" width="70" height="35" fill="url(#hatch1)" stroke="black"/>
  <text x="730" y="55" text-anchor="middle" font-size="9">Cand 10</text>
  <text x="730" y="67" text-anchor="middle" font-size="8">bits 0-24</text>

  <!-- Packed integer -->
  <rect x="20" y="85" width="745" height="30" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="400" y="105" text-anchor="middle" font-size="11">m = v_1 · 2^225 + v_2 · 2^200 + ... + v_10 · 2^0</text>

  <!-- Constraint -->
  <text x="20" y="135" font-size="10" font-weight="bold">Constraint:</text>
  <text x="110" y="135" font-size="10">k × b = 10 × 25 = 250 bits &lt; log2(N) = 255 bits</text>
  <text x="20" y="150" font-size="10" font-weight="bold">Max per slot:</text>
  <text x="130" y="150" font-size="10">2^25 - 1 = 33,554,431 votes</text>
  <text x="20" y="165" font-size="10" font-weight="bold">Homomorphism:</text>
  <text x="140" y="165" font-size="10">Sum preserves slots independently: Σ m_i = Σ_j (Σ_i v_{i,j}) · 2^{25(k-j)}</text>
</svg>
