<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="980" viewBox="0 0 820 980" font-family="serif">
  <rect width="820" height="980" fill="white"/>

  <!-- Title -->
  <text x="410" y="25" text-anchor="middle" font-size="15" font-weight="bold">Protocol Execution Flow: Voter → Aggregation</text>
  <line x1="100" y1="35" x2="720" y2="35" stroke="black" stroke-width="0.5"/>

  <!-- ===== PHASE 1: SETUP ===== -->
  <rect x="30" y="50" width="760" height="100" fill="none" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="30" y="50" width="760" height="22" fill="#e8e8e8" stroke="black" stroke-width="0.5"/>
  <text x="50" y="66" font-size="12" font-weight="bold">Phase 1 — Setup (Trusted Third Party TP)</text>

  <text x="50" y="85" font-size="11">TP chooses safe primes p, q  →  N = p · q</text>
  <text x="50" y="100" font-size="11">TP picks H ∈ Z*_{N²}  →  publishes (N, H), goes offline</text>
  <text x="50" y="115" font-size="11">Aggregator A picks sk_A ∈ Z*_{N²}  →  publishes pk_A = H^{sk_A} mod N²</text>
  <text x="50" y="130" font-size="11">Each voter U_i picks sk_i ∈ [0, N²) independently  (no key dealer)</text>

  <!-- Arrow down -->
  <line x1="410" y1="150" x2="410" y2="165" stroke="black" stroke-width="1.5"/>
  <polygon points="406,160 410,168 414,160" fill="black"/>

  <!-- ===== PHASE 2: VOTER ENCRYPTION ===== -->
  <rect x="30" y="170" width="370" height="130" fill="none" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="30" y="170" width="370" height="22" fill="#e8e8e8" stroke="black" stroke-width="0.5"/>
  <text x="50" y="186" font-size="12" font-weight="bold">Phase 2 — Voter U_i (Browser/WASM)</text>

  <text x="50" y="208" font-size="11">1. Select candidate → vote vector v_i</text>
  <text x="50" y="223" font-size="11">2. Pack: m_i = Σ v_{i,j} · 2^{25(k-j)}</text>
  <text x="50" y="238" font-size="11">3. Encrypt: c_i = H^{sk_i} · (1+N)^{m_i} mod N²</text>
  <text x="50" y="253" font-size="11">4. Compute: aux_i = pk_A^{sk_i} mod N²</text>
  <text x="50" y="272" font-size="10" font-style="italic">   (sk_i serves as both secret key and randomness r)</text>
  <text x="50" y="288" font-size="10" fill="#555">   Performed in WebAssembly (libtommath, Emscripten)</text>

  <!-- Arrows: c_i → Aggregator, aux_i → Collector -->
  <line x1="400" y1="225" x2="450" y2="225" stroke="black" stroke-width="1"/>
  <text x="420" y="218" font-size="9">c_i</text>
  <polygon points="446,221 454,225 446,229" fill="black"/>

  <line x1="400" y1="250" x2="450" y2="310" stroke="black" stroke-width="1"/>
  <text x="415" y="285" font-size="9">aux_i</text>

  <!-- ===== PHASE 3: COLLECTOR ===== -->
  <rect x="440" y="300" width="350" height="90" fill="none" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="440" y="300" width="350" height="22" fill="#e8e8e8" stroke="black" stroke-width="0.5"/>
  <text x="460" y="316" font-size="12" font-weight="bold">Phase 3 — Collector C</text>

  <text x="460" y="338" font-size="11">Receives all aux_i from voters</text>
  <text x="460" y="353" font-size="11">Computes: aux = Π aux_i mod N²</text>
  <text x="460" y="368" font-size="11">         = H^{sk_A · Σ sk_i} mod N²</text>
  <text x="460" y="383" font-size="11">Sends aux → Aggregator A</text>

  <!-- Arrow aux → Aggregator -->
  <line x1="615" y1="390" x2="615" y2="430" stroke="black" stroke-width="1"/>
  <text x="625" y="415" font-size="9">aux</text>
  <polygon points="611,425 615,433 619,425" fill="black"/>

  <!-- Arrow c_i → Aggregator (continued) -->
  <line x1="454" y1="225" x2="615" y2="225" stroke="black" stroke-width="1"/>
  <line x1="615" y1="225" x2="615" y2="430" stroke="black" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="625" y="350" font-size="9" fill="#555">{c_i}</text>

  <!-- Arrow down from voter phase -->
  <line x1="215" y1="300" x2="215" y2="430" stroke="black" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="225" y="370" font-size="9" fill="#555">store c_i, aux_i</text>

  <!-- ===== PHASE 4: AGGREGATION ===== -->
  <rect x="30" y="440" width="760" height="280" fill="none" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="30" y="440" width="760" height="22" fill="#e8e8e8" stroke="black" stroke-width="0.5"/>
  <text x="50" y="456" font-size="12" font-weight="bold">Phase 4 — Aggregator A (Native libtommath C Module)</text>

  <text x="50" y="478" font-size="11" font-weight="bold">Input:</text>
  <text x="120" y="478" font-size="11">ciphertexts {c_1,...,c_n}, aux, (N, H, sk_A)</text>

  <text x="50" y="503" font-size="11" font-weight="bold">Step 1. Product:</text>
  <text x="170" y="503" font-size="11">Π = Π c_i mod N² = (1 + S·N) · H^{Σ sk_i} mod N²</text>
  <text x="170" y="517" font-size="10" fill="#555">where S = Σ x_i (binomial expansion in Z_{N²})</text>

  <text x="50" y="540" font-size="11" font-weight="bold">Step 2. Exponentiate:</text>
  <text x="170" y="540" font-size="11">P = Π^{sk_A} mod N² = (1+S·N)^{sk_A} · H^{sk_A·Σ sk_i} mod N²</text>

  <text x="50" y="565" font-size="11" font-weight="bold">Step 3. Cancel mask:</text>
  <text x="170" y="565" font-size="11">P' = P · aux^{-1} mod N² = (1+S·N)^{sk_A} mod N²</text>
  <text x="170" y="579" font-size="10" fill="#555">aux^{-1} exists because gcd(H, N²)=1 (N is valid semiprime)</text>

  <text x="50" y="602" font-size="11" font-weight="bold">Step 4. L-function:</text>
  <text x="170" y="602" font-size="11">L(P') = (P' − 1) / N = sk_A · S mod N</text>
  <text x="170" y="616" font-size="10" fill="#555">(1+S·N)^{sk_A} ≡ 1 + sk_A·S·N mod N²  (higher terms vanish)</text>

  <text x="50" y="640" font-size="11" font-weight="bold">Step 5. Recover sum:</text>
  <text x="170" y="640" font-size="11">R = L(P') · sk_A^{-1} mod N = S mod N</text>
  <text x="170" y="654" font-size="10" fill="#555">sk_A^{-1} exists because gcd(sk_A, N) = 1 by construction</text>

  <text x="50" y="677" font-size="11" font-weight="bold">Step 6. Unpack:</text>
  <text x="170" y="677" font-size="11">For j = 1..k: count_j = (R ≫ 25(k−j)) mod 2²⁵</text>
  <text x="170" y="691" font-size="10" fill="#555">25-bit slots, reverse order (candidate 1 at MSB)</text>

  <!-- Arrow down -->
  <line x1="410" y1="720" x2="410" y2="740" stroke="black" stroke-width="1.5"/>
  <polygon points="406,735 410,743 414,735" fill="black"/>

  <!-- ===== PHASE 5: RESULT ===== -->
  <rect x="30" y="750" width="760" height="70" fill="none" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="30" y="750" width="760" height="22" fill="#e8e8e8" stroke="black" stroke-width="0.5"/>
  <text x="50" y="766" font-size="12" font-weight="bold">Phase 5 — Result</text>

  <text x="50" y="790" font-size="11">R = Σ x_i = Σ_{i=1}^{n} Σ_{j=1}^{k} v_{i,j} · 2^{25(k-j)}</text>
  <text x="50" y="808" font-size="11">Vote counts: [count_1, count_2, ..., count_k]  where count_j = Σ_i v_{i,j}</text>

  <!-- Assumptions box -->
  <rect x="30" y="840" width="760" height="130" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2" rx="3"/>
  <text x="50" y="858" font-size="11" font-weight="bold">Assumptions for correctness:</text>
  <text x="60" y="875" font-size="10">(A1) N = p·q where p, q are odd primes  →  gcd(aux, N²) = 1, gcd(sk_A, N) = 1</text>
  <text x="60" y="890" font-size="10">(A2) sk_A ≠ H  (non-degenerate key)  →  pk_A ≠ H, decryption non-trivial</text>
  <text x="60" y="905" font-size="10">(A3) S = Σ x_i &lt; N  →  modular reduction is exact, R = S (no wraparound)</text>
  <text x="60" y="920" font-size="10">(A4) k · 25 &lt; log₂ N  →  packed votes fit in single Paillier plaintext</text>
  <text x="60" y="935" font-size="10">(A5) Each v_{i,j} ∈ {0,1}  →  slot sums Σ v_{i,j} &lt; 2²⁵ (no overflow per candidate)</text>
  <text x="60" y="950" font-size="10">(A6) sk_i = r_i (voter uses secret key as encryption randomness)  →  aux_i = pk_A^r_i cancels H^r_i</text>
  <text x="60" y="965" font-size="10" font-style="italic">Under DCR assumption: individual c_i and aux_i are semantically secure (indistinguishable from random in Z*_{N²})</text>
</svg>
