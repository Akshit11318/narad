<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="1050" viewBox="0 0 820 1050" font-family="serif">
  <rect width="820" height="1050" fill="white"/>

  <!-- Title -->
  <text x="410" y="25" text-anchor="middle" font-size="15" font-weight="bold">Protocol Execution: From Voter Ballot to Published Tally</text>
  <line x1="80" y1="35" x2="740" y2="35" stroke="black" stroke-width="0.5"/>

  <!-- ===== PHASE 1: SETUP ===== -->
  <rect x="30" y="50" width="760" height="110" fill="none" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="30" y="50" width="760" height="22" fill="#e8e8e8" stroke="black" stroke-width="0.5"/>
  <text x="50" y="66" font-size="12" font-weight="bold">Phase 1 — Setup (Trusted Third Party TP)</text>

  <text x="50" y="88" font-size="11">1. TP chooses safe primes p, q  →  N = p · q</text>
  <text x="50" y="103" font-size="11">2. TP picks H ∈ Z*_{N²}  →  publishes (N, H), goes offline</text>
  <text x="50" y="118" font-size="11">3. Aggregator A generates sk_A ∈ Z*_{N²}  →  publishes pk_A = H^{sk_A} mod N²</text>
  <text x="50" y="133" font-size="11">4. Each voter U_i independently picks sk_i ∈ [0, N²)  (no key dealer, TP does not know sk_i)</text>
  <text x="50" y="150" font-size="10" font-style="italic">   Assumptions: A1 (N=pq, odd primes), A2 (sk_A ≠ H, gcd(sk_A,N)=1)</text>

  <!-- Arrow down -->
  <line x1="410" y1="160" x2="410" y2="175" stroke="black" stroke-width="1.5"/>
  <polygon points="406,170 410,178 414,170" fill="black"/>

  <!-- ===== PHASE 2: VOTER ===== -->
  <rect x="30" y="180" width="380" height="180" fill="none" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="30" y="180" width="380" height="22" fill="#e8e8e8" stroke="black" stroke-width="0.5"/>
  <text x="50" y="196" font-size="12" font-weight="bold">Phase 2 — Voter U_i (Browser / WASM)</text>

  <text x="50" y="218" font-size="11" font-weight="bold">Step 1: Select candidate → vote vector</text>
  <text x="65" y="233" font-size="10">e.g., candidate 2 of 3 → v = [0, 1, 0]</text>

  <text x="50" y="253" font-size="11" font-weight="bold">Step 2: Pack into integer (25-bit slots)</text>
  <text x="65" y="268" font-size="10">m = v_1·2^50 + v_2·2^25 + v_3·2^0 = 2^25</text>

  <text x="50" y="288" font-size="11" font-weight="bold">Step 3: Paillier encrypt (sk_i = randomness r_i)</text>
  <text x="65" y="303" font-size="10">c_i = H^{sk_i} · (1+N)^m mod N²</text>

  <text x="50" y="323" font-size="11" font-weight="bold">Step 4: Compute auxiliary value</text>
  <text x="65" y="338" font-size="10">aux_i = pk_A^{sk_i} = H^{sk_A · sk_i} mod N²</text>

  <text x="50" y="355" font-size="10" font-style="italic">   Assumptions: A4 (k·25 &lt; log₂ N), A5 (v_{i,j} ∈ {0,1}), A6 (sk_i = r_i)</text>

  <!-- Arrows out of voter -->
  <line x1="410" y1="280" x2="460" y2="280" stroke="black" stroke-width="1.5"/>
  <polygon points="456,277 464,280 456,283" fill="black"/>
  <text x="430" y="272" font-size="10" font-weight="bold">c_i</text>
  <text x="425" y="293" font-size="8" fill="#555">(to chain + DB)</text>

  <line x1="410" y1="330" x2="460" y2="330" stroke="black" stroke-width="1.5"/>
  <polygon points="456,327 464,330 456,333" fill="black"/>
  <text x="430" y="322" font-size="10" font-weight="bold">aux_i</text>
  <text x="425" y="343" font-size="8" fill="#555">(to collector)</text>

  <!-- ===== PHASE 3: COLLECTOR ===== -->
  <rect x="460" y="280" width="330" height="100" fill="none" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="460" y="280" width="330" height="22" fill="#e8e8e8" stroke="black" stroke-width="0.5"/>
  <text x="480" y="296" font-size="12" font-weight="bold">Phase 3 — Collector C</text>

  <text x="480" y="318" font-size="11">Receives all aux_i from voters</text>
  <text x="480" y="335" font-size="11">Computes product:</text>
  <text x="490" y="350" font-size="10">aux = Π aux_i mod N²</text>
  <text x="490" y="365" font-size="10">    = H^{sk_A · Σ sk_i} mod N²</text>
  <text x="480" y="376" font-size="10">Sends aux → Aggregator A</text>

  <!-- Arrow aux → Aggregator -->
  <line x1="625" y1="380" x2="625" y2="420" stroke="black" stroke-width="1.5"/>
  <polygon points="621,415 625,423 629,415" fill="black"/>
  <text x="640" y="405" font-size="10" font-weight="bold">aux</text>

  <!-- Arrow c_i → Aggregator (long path) -->
  <line x1="464" y1="280" x2="625" y2="280" stroke="black" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="625" y1="280" x2="625" y2="420" stroke="black" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="640" y="360" font-size="9" fill="#555" font-style="italic">{c_i}</text>

  <!-- ===== PHASE 4: AGGREGATION ===== -->
  <rect x="30" y="430" width="760" height="320" fill="none" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="30" y="430" width="760" height="22" fill="#e8e8e8" stroke="black" stroke-width="0.5"/>
  <text x="50" y="446" font-size="12" font-weight="bold">Phase 4 — Aggregator A (Native C / libtommath)</text>

  <text x="50" y="470" font-size="11" font-weight="bold">Input:</text>
  <text x="130" y="470" font-size="11">ciphertexts {c_1, ..., c_n}, aux, (N, H, sk_A)</text>

  <line x1="50" y1="480" x2="770" y2="480" stroke="black" stroke-width="0.3"/>

  <text x="50" y="500" font-size="11" font-weight="bold">Step 1. Product of ciphertexts</text>
  <text x="65" y="515" font-size="10">Π = Π_{i=1}^{n} c_i mod N²</text>
  <text x="65" y="528" font-size="10" fill="#444">  = [Π (1 + x_i·N)] · H^{Σ sk_i} mod N²   (binomial expansion, Lemma 1)</text>
  <text x="65" y="541" font-size="10" fill="#444">  = (1 + S·N) · H^{Σ sk_i} mod N²           where S = Σ x_i</text>

  <text x="50" y="562" font-size="11" font-weight="bold">Step 2. Exponentiate by sk_A</text>
  <text x="65" y="577" font-size="10">P = Π^{sk_A} mod N²</text>
  <text x="65" y="590" font-size="10" fill="#444">  = (1 + S·N)^{sk_A} · H^{sk_A · Σ sk_i} mod N²</text>

  <text x="50" y="612" font-size="11" font-weight="bold">Step 3. Cancel mask with aux</text>
  <text x="65" y="627" font-size="10">P' = P · aux^{-1} mod N²</text>
  <text x="65" y="640" font-size="10" fill="#444">  = (1 + S·N)^{sk_A} · H^{sk_A·Σsk_i} · H^{-sk_A·Σsk_i} mod N²</text>
  <text x="65" y="653" font-size="10" fill="#444">  = (1 + S·N)^{sk_A} mod N²                    (Theorem 2: mask cancelled)</text>

  <text x="50" y="675" font-size="11" font-weight="bold">Step 4. Apply L-function</text>
  <text x="65" y="690" font-size="10">L(P') = (P' − 1) / N = sk_A · S mod N    (binomial: (1+SN)^{sk_A} ≡ 1 + sk_A·S·N mod N²)</text>

  <text x="50" y="712" font-size="11" font-weight="bold">Step 5. Multiply by sk_A^{-1} to recover sum</text>
  <text x="65" y="727" font-size="10">R = L(P') · sk_A^{-1} mod N = S mod N     (Theorem 3)</text>
  <text x="65" y="740" font-size="10" fill="#444">  Since S &lt; N (Assumption A3): R = S exactly</text>

  <!-- Arrow down -->
  <line x1="410" y1="750" x2="410" y2="770" stroke="black" stroke-width="1.5"/>
  <polygon points="406,765 410,773 414,765" fill="black"/>

  <!-- ===== PHASE 5: PUBLISH ===== -->
  <rect x="30" y="780" width="760" height="100" fill="none" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="30" y="780" width="760" height="22" fill="#e8e8e8" stroke="black" stroke-width="0.5"/>
  <text x="50" y="796" font-size="12" font-weight="bold">Phase 5 — Unpack &amp; Publish Results</text>

  <text x="50" y="818" font-size="11">R = Σ x_i = Σ_{i=1}^{n} [v_{i,1}·2^{25(k-1)} + v_{i,2}·2^{25(k-2)} + ... + v_{i,k}·2^0]</text>
  <text x="50" y="835" font-size="11">  = Σ_j [ (Σ_i v_{i,j}) · 2^{25(k-j)} ]     (slots are independent, Corollary 1)</text>
  <text x="50" y="855" font-size="11">Extract: count_j = (R ≫ 25(k−j)) mod 2²⁵   for j = 1..k</text>
  <text x="50" y="872" font-size="11">Publish: [count_1, count_2, ..., count_k]  →  Portal visualization + on-chain record</text>

  <!-- ===== ASSUMPTIONS BOX ===== -->
  <rect x="30" y="900" width="760" height="140" fill="none" stroke="black" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <text x="50" y="920" font-size="11" font-weight="bold">Assumptions for Correctness (referenced in proofs):</text>
  <text x="60" y="938" font-size="10">(A1) N = p·q, p and q distinct odd primes → Z*_{N²} well-defined, inverses exist</text>
  <text x="60" y="953" font-size="10">(A2) sk_A ≠ H and gcd(sk_A, N) = 1 → non-degenerate key, sk_A^{-1} mod N exists</text>
  <text x="60" y="968" font-size="10">(A3) S = Σ x_i &lt; N → R = S mod N = S (exact, no wraparound)</text>
  <text x="60" y="983" font-size="10">(A4) k × 25 &lt; log₂ N → packed vote fits in single Paillier plaintext</text>
  <text x="60" y="998" font-size="10">(A5) v_{i,j} ∈ {0,1} and Σ_i v_{i,j} &lt; 2²⁵ → no per-slot overflow</text>
  <text x="60" y="1013" font-size="10">(A6) sk_i = r_i (key as randomness) → aux_i = pk_A^{r_i} cancels H^{r_i} in aggregation</text>
  <text x="60" y="1033" font-size="10" font-style="italic">Privacy: Under DCR assumption, c_i and aux_i are indistinguishable from random in Z*_{N²}</text>
</svg>
